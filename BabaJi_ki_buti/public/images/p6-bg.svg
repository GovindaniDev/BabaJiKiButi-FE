<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000">
  <defs>
    <!-- Darker background gradient -->
    <linearGradient id="bgGrad6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4566a7ff"/>
      <stop offset="50%" stop-color="#39558dff"/>
      <stop offset="100%" stop-color="#2a4376ff"/>
    </linearGradient>

    <!-- Blue healing glow (slightly stronger center for dark theme) -->
    <radialGradient id="blueGlow6" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.30"/>
      <stop offset="40%" stop-color="#42a5f5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0"/>
    </radialGradient>

    <!-- Aqua gradient (kept, works well on dark) -->
    <linearGradient id="aquaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="50%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>

    <!-- Stronger vignette for dark edges -->
    <radialGradient id="vignette6" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000066"/>
    </radialGradient>

    <!-- Kidney motif -->
    <g id="kidney" fill="none" stroke="#42a5f5" stroke-width="3">
      <path d="M0,-80 C-60,-80 -100,-20 -100,40 C-100,100 -60,150 0,160" fill="#42a5f522"/>
      <path d="M0,-80 C60,-80 100,-20 100,40 C100,100 60,150 0,160" fill="#42a5f522"/>
      <circle cx="0" cy="0" r="15" fill="#42a5f5" stroke="none"/>
    </g>

    <!-- Water ripple effect -->
    <g id="ripple" fill="none" stroke="#29b6f6" stroke-width="2" opacity="0.4">
      <circle cx="0" cy="0" r="60"/>
      <circle cx="0" cy="0" r="120"/>
      <circle cx="0" cy="0" r="180"/>
    </g>

    <!-- Blur filter -->
    <filter id="softBlur6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>

    <!-- Rounded-corner clip for the whole canvas -->
    <clipPath id="roundCorners">
      <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- EVERYTHING VISIBLE IS CLIPPED TO THE ROUNDED RECT -->
  <g clip-path="url(#roundCorners)">
    <!-- Background base -->
    <rect width="3000" height="2000" fill="url(#bgGrad6)"/>

    <!-- Healing glow -->
    <circle cx="1500" cy="1000" r="950" fill="url(#blueGlow6)"/>

    <!-- Kidney motifs -->
    <g transform="translate(550,1500) scale(1.4)" opacity="0.7" filter="url(#softBlur6)">
      <use href="#kidney"/>
    </g>
    <g transform="translate(2500,500) scale(1.0)" opacity="0.5">
      <use href="#kidney"/>
    </g>

    <!-- Ripples for cleansing water effect -->
    <g transform="translate(1500,1000)" opacity="0.4">
      <use href="#ripple"/>
    </g>

    <!-- Aqua waves at bottom -->
    <path d="M0,1720 C500,1680 1000,1780 1500,1720 C2000,1660 2500,1780 3000,1720 L3000,2000 L0,2000 Z"
          fill="url(#aquaGrad)" opacity="0.18"/>
    <path d="M0,1780 C600,1700 1200,1850 1800,1750 C2400,1650 2800,1850 3000,1750 L3000,2000 L0,2000 Z"
          fill="#42a5f533" opacity="0.1"/>

    <!-- Top light (kept subtle) -->
    <rect x="0" y="0" width="3000" height="350" fill="url(#aquaGrad)" opacity="0.06"/>

    <!-- Vignette -->
    <rect x="0" y="0" width="3000" height="2000" fill="url(#vignette6)"/>
  </g>

  <!-- Optional border following the same radius -->
  <!-- <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120" fill="none" stroke="#00000022"/> -->
</svg>
