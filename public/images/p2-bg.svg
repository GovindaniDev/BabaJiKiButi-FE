<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000">
  <defs>
    <!-- Corner radius for the whole canvas -->
    <clipPath id="roundCorners">
      <!-- adjust rx/ry for more/less rounding -->
      <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120"/>
    </clipPath>

    <!-- Base gradient background -->
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f0a"/>
      <stop offset="50%" stop-color="#123d1a"/>
      <stop offset="100%" stop-color="#091a09"/>
    </linearGradient>

    <!-- Green glow -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8bc34a" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#8bc34a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#8bc34a" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold highlights -->
    <linearGradient id="goldGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="40%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <!-- Vignette -->
    <radialGradient id="vignette2" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#000000dd"/>
    </radialGradient>

    <!-- Mandala pattern (lighter, more herbal) -->
    <g id="mandala2">
      <circle cx="0" cy="0" r="250" fill="none" stroke="url(#goldGrad2)" stroke-width="3" opacity="0.9"/>
      <circle cx="0" cy="0" r="200" fill="none" stroke="url(#goldGrad2)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="150" fill="none" stroke="url(#goldGrad2)" stroke-width="2" opacity="0.5"/>
      <!-- Herbal leaf motifs -->
      <path d="M0,-200 C30,-150 30,-120 0,-100 C-30,-120 -30,-150 0,-200 Z" fill="none" stroke="#8bc34a" stroke-width="2"/>
      <use href="#leaf2" transform="rotate(45)"/>
      <use href="#leaf2" transform="rotate(90)"/>
      <use href="#leaf2" transform="rotate(135)"/>
      <use href="#leaf2" transform="rotate(180)"/>
      <use href="#leaf2" transform="rotate(225)"/>
      <use href="#leaf2" transform="rotate(270)"/>
      <use href="#leaf2" transform="rotate(315)"/>
    </g>

    <!-- Define herbal leaf -->
    <g id="leaf2" fill="none" stroke="#8bc34a" stroke-width="2">
      <path d="M0,-160 C20,-140 20,-120 0,-110 C-20,-120 -20,-140 0,-160 Z" fill="#8bc34a22"/>
    </g>

    <!-- Herbal pattern fill -->
    <pattern id="herbPattern" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="2" fill="#8bc34a55"/>
      <path d="M20,40 Q40,10 60,40 Q40,70 20,40 Z" fill="none" stroke="#8bc34a44" stroke-width="1"/>
    </pattern>

    <!-- Blur filter for glow leaves -->
    <filter id="softBlur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- EVERYTHING VISIBLE IS CLIPPED TO THE ROUNDED RECTANGLE -->
  <g clip-path="url(#roundCorners)">
    <!-- Background -->
    <rect width="3000" height="2000" fill="url(#bgGrad2)"/>

    <!-- Herbal pattern overlay -->
    <rect width="3000" height="2000" fill="url(#herbPattern)" opacity="0.1"/>

    <!-- Glow for product focus -->
    <circle cx="1500" cy="1000" r="950" fill="url(#greenGlow)"/>

    <!-- Mandalas -->
    <g transform="translate(550,1600) scale(1.5)">
      <use href="#mandala2"/>
    </g>
    <g transform="translate(2600,400) scale(0.8) rotate(30)">
      <use href="#mandala2" opacity="0.5"/>
    </g>

    <!-- Herbal glowing leaves -->
    <g opacity="0.7" filter="url(#softBlur2)">
      <use href="#leaf2" transform="translate(1800,1150) rotate(-15) scale(1.4)"/>
      <use href="#leaf2" transform="translate(1200,900) rotate(160) scale(1.1)"/>
      <use href="#leaf2" transform="translate(2200,1400) rotate(45) scale(1.2)"/>
    </g>

    <!-- Gold herbal waves at bottom -->
    <path d="M0,1720 C500,1680 800,1800 1300,1720 C1800,1640 2200,1800 2700,1720 C2900,1680 3000,1700 3000,1700 L3000,2000 L0,2000 Z"
          fill="url(#goldGrad2)" opacity="0.15"/>

    <!-- Top golden light -->
    <rect x="0" y="0" width="3000" height="400" fill="url(#goldGrad2)" opacity="0.07"/>

    <!-- Vignette -->
    <rect x="0" y="0" width="3000" height="2000" fill="url(#vignette2)"/>
  </g>
</svg>
