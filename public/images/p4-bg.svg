<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000">
  <defs>
    <linearGradient id="bgGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a0d24"/>
      <stop offset="50%" stop-color="#7c1f46"/>
      <stop offset="100%" stop-color="#4a0d24"/>
    </linearGradient>
    <radialGradient id="roseGlow" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#f06292" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#f06292" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f06292" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="40%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <pattern id="softDots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#ffffff22"/>
    </pattern>
    <radialGradient id="vignette4" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#000000cc"/>
    </radialGradient>
    <g id="butterfly" fill="none" stroke="#ffffff" stroke-width="3">
      <path d="M0,0 c-60,-70 -160,-60 -210,-10 c-50,50 -20,110 40,120 c80,10 130,-60 170,-110 z" fill="#ffffff22"/>
      <path d="M0,0 c60,-70 160,-60 210,-10 c50,50 20,110 -40,120 c-80,10 -130,-60 -170,-110 z" fill="#ffffff22"/>
      <line x1="0" y1="-20" x2="0" y2="120" stroke="#ffffff66" stroke-width="6"/>
      <circle cx="0" cy="130" r="30" fill="#ffffff33" stroke="none"/>
    </g>
    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8bbd0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f06292" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="softBlur4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- NEW: rounded-corner clip for the whole canvas -->
    <clipPath id="roundCorners">
      <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- EVERYTHING VISIBLE IS CLIPPED TO THE ROUNDED RECT -->
  <g clip-path="url(#roundCorners)">
    <rect width="3000" height="2000" fill="url(#bgGrad4)"/>
    <rect width="3000" height="2000" fill="url(#softDots)" opacity="0.08"/>
    <circle cx="1500" cy="1050" r="950" fill="url(#roseGlow)"/>
    <path d="M3000,0 L3000,450 C2700,520 2400,480 2100,350 C1750,200 1350,150 1000,260 C650,370 350,360 0,260 L0,0 Z"
          fill="url(#goldGrad4)" opacity="0.18"/>
    <path d="M0,1550 C400,1500 900,1600 1400,1550 C1900,1500 2350,1620 3000,1550 L3000,2000 L0,2000 Z"
          fill="url(#ribbonGrad)" opacity="0.18"/>
    <path d="M0,1650 C500,1600 1000,1700 1500,1650 C2000,1600 2500,1700 3000,1650 L3000,2000 L0,2000 Z"
          fill="url(#goldGrad4)" opacity="0.12"/>
    <g transform="translate(520,1520) scale(1.4)" opacity="0.7" filter="url(#softBlur4)">
      <use href="#butterfly"/>
    </g>
    <g transform="translate(2600,420) scale(0.9) rotate(15)" opacity="0.55">
      <use href="#butterfly"/>
    </g>
    <g transform="translate(2350,1400) scale(0.7) rotate(-10)" opacity="0.5">
      <use href="#butterfly"/>
    </g>
    <rect x="0" y="0" width="3000" height="350" fill="url(#goldGrad4)" opacity="0.06"/>
    <rect x="0" y="0" width="3000" height="2000" fill="url(#vignette4)"/>
  </g>

  <!-- Optional border that follows the same radius -->
  <!-- <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120" fill="none" stroke="#ffffff22"/> -->
</svg>
