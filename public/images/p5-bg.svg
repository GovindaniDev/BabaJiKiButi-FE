<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000">
  <defs>
    <!-- Base gradient -->
    <linearGradient id="bgGrad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>

    <!-- Green glow for vitality -->
    <radialGradient id="greenGlow5" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#00e676" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>

    <!-- Red glow for liver symbol -->
    <radialGradient id="redGlow5" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold accents -->
    <linearGradient id="goldGrad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="40%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <!-- Vignette -->
    <radialGradient id="vignette5" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#000000cc"/>
    </radialGradient>

    <!-- Herbal leaf motif -->
    <g id="leaf5" fill="none" stroke="#00e676" stroke-width="2">
      <path d="M0,0 C30,-50 80,-50 120,0 C80,20 40,20 0,0 Z" fill="#00e67622"/>
      <path d="M0,0 C30,-50 80,-50 120,0"/>
      <path d="M20,-5 C50,-35 80,-35 100,-5"/>
    </g>

    <!-- Blur filter -->
    <filter id="softBlur5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>

    <!-- Mandala energy pattern -->
    <g id="mandala5">
      <circle cx="0" cy="0" r="240" fill="none" stroke="url(#goldGrad5)" stroke-width="3" opacity="0.8"/>
      <circle cx="0" cy="0" r="190" fill="none" stroke="#00e676" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="140" fill="none" stroke="#ff1744" stroke-width="2" opacity="0.5"/>
      <path d="M-200,0 Q0,-280 200,0 Q0,280 -200,0 Z" fill="none" stroke="#00e676" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- NEW: rounded-corner clip for the whole canvas -->
    <clipPath id="roundCorners">
      <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- EVERYTHING VISIBLE IS CLIPPED TO THE ROUNDED RECT -->
  <g clip-path="url(#roundCorners)">
    <!-- Base background -->
    <rect width="3000" height="2000" fill="url(#bgGrad5)"/>

    <!-- Green vitality glow -->
    <circle cx="1500" cy="1000" r="950" fill="url(#greenGlow5)"/>

    <!-- Red central liver glow -->
    <circle cx="1500" cy="1000" r="600" fill="url(#redGlow5)"/>

    <!-- Mandalas -->
    <g transform="translate(600,1600) scale(1.4)">
      <use href="#mandala5"/>
    </g>
    <g transform="translate(2500,400) scale(0.9) rotate(20)">
      <use href="#mandala5" opacity="0.55"/>
    </g>

    <!-- Herbal glowing leaves -->
    <g opacity="0.7" filter="url(#softBlur5)">
      <use href="#leaf5" transform="translate(1800,1150) rotate(-15) scale(1.4)"/>
      <use href="#leaf5" transform="translate(1200,850) rotate(160) scale(1.1)"/>
      <use href="#leaf5" transform="translate(2200,1400) rotate(35) scale(1.2)"/>
    </g>

    <!-- Golden energy waves -->
    <path d="M0,1720 C500,1680 900,1800 1400,1720 C1900,1640 2200,1800 2700,1720 C2900,1680 3000,1700 3000,1700 L3000,2000 L0,2000 Z"
          fill="url(#goldGrad5)" opacity="0.15"/>
    <path d="M0,1780 C500,1700 1000,1800 1500,1750 C2000,1700 2500,1800 3000,1750 L3000,2000 L0,2000 Z"
          fill="#00e67633" opacity="0.1"/>

    <!-- Top golden shimmer -->
    <rect x="0" y="0" width="3000" height="400" fill="url(#goldGrad5)" opacity="0.06"/>

    <!-- Vignette -->
    <rect x="0" y="0" width="3000" height="2000" fill="url(#vignette5)"/>
  </g>

  <!-- Optional border following the same radius -->
  <!-- <rect x="0" y="0" width="3000" height="2000" rx="120" ry="120" fill="none" stroke="#ffffff22"/> -->
</svg>
